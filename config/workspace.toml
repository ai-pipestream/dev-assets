# ai-pipestream workspace configuration.
#
# Source of truth for: workspace root, JDK version, repo manifest.
# Per-machine overrides go in $XDG_CONFIG_HOME/ai-pipestream/workspace.toml
# (defaults to ~/.config/ai-pipestream/workspace.toml). Override file fields
# are merged on top of these defaults.

[workspace]
# Workspace root. Repos are cloned under <root>/<path>/<name>.
# The agreed layout: <root>/main/<category>/<repo> for canonical-branch
# checkouts and <root>/worktrees/ for in-progress branch worktrees.
root = "/work"

# Maven local repository. The default below puts it on the workspace
# disk (typically faster than $HOME). Set to "$HOME/.m2/repository" or
# any absolute path to use a different location. The bootstrap only
# affects builds it invokes — to make the IDE / manual gradle / mvn
# also use this path, add to ~/.m2/settings.xml:
#   <settings><localRepository>/work/.m2/repository</localRepository></settings>
m2_repo = "/work/.m2/repository"

# JVM distribution (sdkman identifier). 21-tem is also supported.
jdk = "25-tem"

# Git protocol when cloning. Override per-run with --ssh / --https.
clone_protocol = "https"

# Parallel git clones during the bootstrap clone phase.
parallelism = 8

# GitHub org all platform repos live under.
github_org = "ai-pipestream"


# ============================================================================
# Repo manifest
# ============================================================================
# Each [[repo]] entry produces:
#   <root>/<path>/<name>
#
# Fields:
#   path          required  destination directory under <root>
#   name          required  GitHub repo name under <github_org>
#   branch        optional  default "main"
#   build_first   optional  default false; if true, this repo is built
#                           SERIALLY before any parallel build starts
#                           (used to warm ~/.m2 and prevent gradle races)
#
# To add a new repo: add a [[repo]] block, commit, and re-run
#   ./bootstrap.sh clone --update
# To remove a repo from the bootstrap, delete its block — existing on-disk
# clones are left alone (only the bootstrap stops touching them).

# ---- core-services -----------------------------------------------------
# The platform foundation. pipestream-platform is built first to seed
# ~/.m2/repository so the parallel gradle builds in the rest of the tree
# don't race when first compiling.
[[repo]]
path = "main/core-services"
name = "pipestream-platform"
build_first = true

