# ============================================================================
# Reference-code manifest
# ============================================================================
# OSS upstream clones used for grep, learning, and contributing patches.
# These land at <root>/main/reference-code/<name>. They are NEVER built
# and are NOT cloned by `clone` — only by `reference-sync`.
#
# Fields:
#   name     required  destination directory name
#   url      required  full git URL (any host, public)
#   branch   optional  default = remote default branch
#
# Note: a user-override `~/.config/ai-pipestream/workspace.toml` containing
# its own [[ref_repo]] table fully REPLACES this list (TOML array semantics).
# To add a single repo, copy this list into your override and append.

# ---- Quarkus + extensions used by the platform -------------------------
